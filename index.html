<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınav Kağıdı Hazırlayıcı - Sadeleştirilmiş Sayfalar</title>
    <style>
        :root {
            --soru-bosluk: 1.5cm;
        }

        /* --- Arayüz Ayarları --- */
        body { font-family: Arial, sans-serif; background-color: #444; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 30px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; justify-content: center; width: 100%; max-width: 900px; position: sticky; top: 10px; z-index: 1000; }
        .controls input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 180px; }
        .controls input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 60px; }
        .controls .setting-group { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 14px; color: #333; }
        .controls button { padding: 10px 15px; background-color: #f38220; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .controls button:hover { background-color: #d66f15; }
        .controls .clear-btn { background-color: #dc3545; }
        .controls .clear-btn:hover { background-color: #c82333; }
        #loadingIndicator { display: none; color: #f38220; font-weight: bold; margin-left: 10px; }

        /* --- Sınav Kağıdı Konteyneri --- */
        #examContainer { display: flex; flex-direction: column; gap: 40px; width: 210mm; }

        .paper { background: white; width: 210mm; height: 297mm; max-height: 297mm; padding: 15mm 15mm 10mm 15mm; box-shadow: 0 0 15px rgba(0,0,0,0.5); box-sizing: border-box; display: flex; flex-direction: column; position: relative; margin: 0 auto; overflow: hidden; }
        
        /* Başlık Kutusu */
        .header-box { border: 2px solid #f38220; border-radius: 12px; overflow: hidden; margin-bottom: 8mm; flex-shrink: 0; }
        .header-top { background-color: #f38220; padding: 6px; text-align: center; }
        .header-top h1 { margin: 0; font-size: 16px; font-weight: bold; color: black; }
        
        /* Alt Başlık (Sadece 1. Sayfada Görünecek) */
        .header-bottom { 
            padding: 8px 15px; 
            background-color: white; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .header-bottom .student-info { font-size: 14px; font-weight: bold; color: #000; }
        .header-bottom .creator-info p { margin: 0; font-size: 14px; font-weight: bold; color: #000; text-align: right; }

        /* Sütunlar ve Sorular */
        .content-wrapper { flex: 1; display: flex; position: relative; height: 100%; max-height: 100%; }
        .content-wrapper::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1.5px; background-color: #f38220; transform: translateX(-50%); z-index: 1; }
        .column { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; }
        .left-column { padding-right: 10mm; box-sizing: border-box; }
        .right-column { padding-left: 10mm; box-sizing: border-box; }
        .question-item { margin-bottom: var(--soru-bosluk); display: flex; align-items: flex-start; gap: 8px; flex-shrink: 0; }
        .question-number { font-weight: bold; font-size: 14px; min-width: 20px; padding-top: 2px; }
        .question-image { flex: 1; }
        .question-image img { max-width: 100%; max-height: 220mm; object-fit: contain; display: block; }
        
        /* Alt Bilgi */
        .footer { border-top: 1.5px solid #f38220; position: relative; margin-top: auto; padding-top: 10px; text-align: center; flex-shrink: 0; z-index: 2; }
        .page-number { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: white; border: 1.5px solid #f38220; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #f38220; font-size: 14px; z-index: 3; }

        @media print {
            body { background: white; margin: 0; padding: 0; align-items: flex-start; }
            .controls { display: none; }
            #examContainer { gap: 0; }
            .paper { box-shadow: none; margin: 0; width: 210mm; height: 297mm; page-break-after: always; }
            .paper:last-child { page-break-after: auto; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="controls no-print">
        <input type="text" id="examTitle" placeholder="Deneem Sınavı">
        <input type="text" id="creatorName" placeholder="HLT Matematik">
        <div class="setting-group">
            Boşluk(cm): <input type="number" id="spacingInput" value="1.5" step="0.5" min="0">
        </div>
        <input type="file" id="imageUploader" multiple accept="image/png, image/jpeg, image/jpg">
        <button onclick="window.print()">PDF Olarak Çıktı Al</button>
        <button class="clear-btn" onclick="clearAll()">Tümünü Temizle</button>
        <span id="loadingIndicator">Yeniden Hesaplanıyor...</span>
    </div>

    <div id="examContainer"></div>

    <script>
        let uploadedImages = []; 
        let currentPage = 1;
        let currentSide = 'left';
        let isProcessing = false;

        window.onload = () => {
            document.getElementById('examContainer').appendChild(createPage(1));
        };

        function createPage(pageNum) {
            const title = document.getElementById('examTitle').value || 'Deneme Sınavı';
            const creator = document.getElementById('creatorName').value || 'HLT Matematik';
            const page = document.createElement('div');
            page.className = 'paper';
            page.id = `page-${pageNum}`;
            
            // Eğer 1. sayfadaysak alt bilgi alanını (Ad Soyad ve Hazırlayan) tamamen oluştur.
            // Diğer sayfalarda bu alanı (header-bottom) hiç ekleme.
            let headerBottomHtml = '';
            if (pageNum === 1) {
                headerBottomHtml = `
                    <div class="header-bottom">
                        <div class="student-info">Ad - Soyad: </div>
                        <div class="creator-info"><p class="displayCreator">${creator}</p></div>
                    </div>
                `;
            }
            
            page.innerHTML = `
                <div class="header-box">
                    <div class="header-top"><h1 class="displayTitle">${title}</h1></div>
                    ${headerBottomHtml}
                </div>
                <div class="content-wrapper">
                    <div class="column left-column" id="page-${pageNum}-left"></div>
                    <div class="column right-column" id="page-${pageNum}-right"></div>
                </div>
                <div class="footer"><div class="page-number">${pageNum}</div></div>
            `;
            return page;
        }

        document.getElementById('imageUploader').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            toggleUI(true); 

            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    const imgSrc = await readFileAsDataURL(file);
                    uploadedImages.push(imgSrc); 
                    await placeQuestionInDOM(imgSrc, uploadedImages.length); 
                }
            }
            
            this.value = ''; 
            toggleUI(false);
        });

        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        let spacingTimeout;
        document.getElementById('spacingInput').addEventListener('input', function(e) {
            const gap = e.target.value || 0;
            document.documentElement.style.setProperty('--soru-bosluk', gap + 'cm');
            if(uploadedImages.length === 0) return;

            clearTimeout(spacingTimeout);
            spacingTimeout = setTimeout(() => {
                reRenderExam();
            }, 500); 
        });

        async function reRenderExam() {
            if(isProcessing) return;
            isProcessing = true;
            document.getElementById('loadingIndicator').style.display = 'inline';

            document.getElementById('examContainer').innerHTML = '';
            currentPage = 1;
            currentSide = 'left';
            document.getElementById('examContainer').appendChild(createPage(1));

            for (let i = 0; i < uploadedImages.length; i++) {
                await placeQuestionInDOM(uploadedImages[i], i + 1);
            }

            document.getElementById('loadingIndicator').style.display = 'none';
            isProcessing = false;
        }

        async function placeQuestionInDOM(imgSrc, qNum) {
            await new Promise(resolve => {
                const tempImg = new Image();
                tempImg.onload = resolve;
                tempImg.src = imgSrc;
            });

            let placed = false;

            while (!placed) {
                let targetColumn = document.getElementById(`page-${currentPage}-${currentSide}`);
                
                if (!targetColumn) {
                    document.getElementById('examContainer').appendChild(createPage(currentPage));
                    targetColumn = document.getElementById(`page-${currentPage}-${currentSide}`);
                }

                const qDiv = document.createElement('div');
                qDiv.className = 'question-item';
                qDiv.innerHTML = `
                    <span class="question-number">${qNum}.</span>
                    <div class="question-image"><img src="${imgSrc}"></div>
                `;

                targetColumn.appendChild(qDiv);

                await new Promise(r => setTimeout(r, 20));

                const colRect = targetColumn.getBoundingClientRect();
                const qRect = qDiv.getBoundingClientRect();
                const style = window.getComputedStyle(qDiv);
                const marginBottom = parseFloat(style.marginBottom) || 0;

                if ((qRect.bottom + marginBottom) > colRect.bottom + 5) {
                    if (targetColumn.children.length === 1) {
                        placed = true;
                        advancePagePointer();
                    } else {
                        targetColumn.removeChild(qDiv); 
                        advancePagePointer(); 
                    }
                } else {
                    placed = true; 
                }
            }
        }

        function advancePagePointer() {
            if (currentSide === 'left') {
                currentSide = 'right'; 
            } else {
                currentPage++; 
                currentSide = 'left';
            }
        }

        function toggleUI(disable) {
            document.getElementById('imageUploader').disabled = disable;
            document.getElementById('spacingInput').disabled = disable;
        }

        document.getElementById('examTitle').addEventListener('input', function(e) {
            const val = e.target.value || '6.SINIF 2.DENEME';
            document.querySelectorAll('.displayTitle').forEach(el => el.innerText = val);
        });

        document.getElementById('creatorName').addEventListener('input', function(e) {
            const val = e.target.value || 'HLT Matematik';
            document.querySelectorAll('.displayCreator').forEach(el => el.innerText = val);
        });

        function clearAll() {
            uploadedImages = []; 
            currentPage = 1;
            currentSide = 'left';
            document.getElementById('examContainer').innerHTML = '';
            document.getElementById('examContainer').appendChild(createPage(1));
        }
    </script>

</body>
</html>
